<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Crop - OptiCrop</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header>
    <h1>OptiCrop: Smart Agricultural Production Optimization Engine</h1>

    <nav>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/findyourcrop">Find Your Crop</a>
    </nav>
</header>

<section class="prediction-form">

    <h2>Find Your Best Crop</h2>

    <form action="/predict" method="POST">

        <label>Nitrogen</label><br>
        <input type="number" name="nitrogen" required><br><br>

        <label>Phosphorous</label><br>
        <input type="number" name="phosphorous" required><br><br>

        <label>Potassium</label><br>
        <input type="number" name="potassium" required><br><br>

        <label>Temperature</label><br>
        <input type="number" step="any" name="temperature" required><br><br>

        <label>Humidity</label><br>
        <input type="number" step="any" name="humidity" required><br><br>

        <label>pH</label><br>
        <input type="number" step="any" name="ph" required><br><br>

        <label>Rainfall</label><br>
        <input type="number" step="any" name="rainfall" required><br><br>

        <button type="submit">Predict Crop</button>

    </form>

    <br>

    {% if prediction_text %}
        <h2>{{ prediction_text }}</h2>
    {% endif %}

</section>

<footer>
    <p>© 2026 OptiCrop | Smart Agricultural Production Optimization Engine</p>
</footer>

</body>
</html>
